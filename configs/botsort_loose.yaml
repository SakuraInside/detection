# Looser BoT-SORT profile for small/occluded objects (bottles, bags near edges).
# Keeps more low-confidence detections in tracking so they are not dropped
# before the analyzer stage.

tracker_type: botsort

# Lower thresholds compared to default botsort.yaml.
track_high_thresh: 0.11
track_low_thresh: 0.02
new_track_thresh: 0.07

# Matching / persistence.
match_thresh: 0.76
track_buffer: 150
fuse_score: true

# GMC sparse optical flow сильно нагружает CPU на битых/шумных H264 потоках.
# Для стабильного FPS в desktop-режиме отключаем компенсацию движения камеры.
gmc_method: none

# ReID off for speed/stability on single camera scenario.
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: false
